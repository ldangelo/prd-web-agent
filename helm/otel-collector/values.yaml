# Default values for otel-collector.

replicaCount: 1

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.96.0"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  ports:
    otlpGrpc: 4317
    otlpHttp: 4318
    prometheus: 8889

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Collector pipeline configuration
config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

  processors:
    batch:
      timeout: 5s
      send_batch_size: 1024
      send_batch_max_size: 2048

  exporters:
    debug:
      verbosity: basic
    # Configure an OTLP exporter to forward telemetry to a backend
    # otlp:
    #   endpoint: "your-backend:4317"
    #   tls:
    #     insecure: false

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [debug]
      metrics:
        receivers: [otlp]
        processors: [batch]
        exporters: [debug]
      logs:
        receivers: [otlp]
        processors: [batch]
        exporters: [debug]

nodeSelector: {}
tolerations: []
affinity: {}
