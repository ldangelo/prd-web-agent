# Allow staging pods to send telemetry to SigNoz OTel collector in monitoring namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-otel-egress
  namespace: staging
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 4317  # OTLP gRPC
          protocol: TCP
        - port: 4318  # OTLP HTTP
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              environment: monitoring
---
# Allow production pods to send telemetry to SigNoz OTel collector in monitoring namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-otel-egress
  namespace: production
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 4317  # OTLP gRPC
          protocol: TCP
        - port: 4318  # OTLP HTTP
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              environment: monitoring
---
# Allow SigNoz OTel collector to receive from app namespaces
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-otel-ingress
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: otel-collector
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 4317
          protocol: TCP
        - port: 4318
          protocol: TCP
      from:
        - namespaceSelector:
            matchLabels:
              environment: staging
        - namespaceSelector:
            matchLabels:
              environment: production
