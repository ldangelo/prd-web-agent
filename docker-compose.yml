services:
  postgres:
    image: postgres:15-alpine
    container_name: prd-web-agent-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: prd_web_agent_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prd_web_agent_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: prd-web-agent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  openclaw:
    image: ghcr.io/phioranex/openclaw-docker:latest
    container_name: prd-web-agent-openclaw
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${PI_SDK_API_KEY}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
    volumes:
      - ./openclaw/skills:/home/node/.openclaw/workspace/skills
      - ./openclaw/config/openclaw.json:/home/node/.openclaw/openclaw.json
    ports:
      - "18789:18789"
    command: ["gateway", "--port", "18789"]

volumes:
  postgres_data:
  redis_data:
