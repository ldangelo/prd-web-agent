name: Auto-Implement PRD

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  auto-implement:
    name: Auto-Implement from PRD
    if: github.event.label.name == 'auto-implement'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Find PRD file
        id: find-prd
        run: |
          PRD_FILE=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -iE '(prd|product.?req).*\.md$' \
            | head -1)

          if [ -z "$PRD_FILE" ]; then
            echo "::error::No PRD markdown file found in this PR's changes."
            exit 1
          fi

          echo "prd_file=${PRD_FILE}" >> "$GITHUB_OUTPUT"
          echo "Found PRD file: ${PRD_FILE}"

      - name: Create TRD from PRD
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true
          plugin_marketplaces: |
            https://github.com/FortiumPartners/ensemble.git
          plugins: |
            ensemble-full@ensemble
          prompt: |
            Use the /ensemble-development:ensemble:create-trd skill to create a TRD
            from the PRD file at "${{ steps.find-prd.outputs.prd_file }}".

            After creating the TRD, commit it to the current branch and push.
          claude_args: >-
            --model claude-sonnet-4-6
            --max-turns 30
            --allowedTools "Edit,Write,Read,Glob,Grep,Bash(git:*),Bash(mkdir:*),Bash(ls:*),Bash(cat:*),Bash(find:*),Bash(grep:*),Bash(head:*),Bash(tail:*),Bash(wc:*)"

      - name: Implement TRD
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true
          plugin_marketplaces: |
            https://github.com/FortiumPartners/ensemble.git
          plugins: |
            ensemble-full@ensemble
          prompt: |
            Use the /ensemble-development:ensemble:implement-trd skill to implement
            the TRD that was just created in the docs/TRD/ directory.

            Run the test suite (npm test) and fix any failures before committing.
            Commit all implementation files and push to the current branch.
          claude_args: >-
            --model claude-sonnet-4-6
            --max-turns 50
            --allowedTools "Edit,Write,Read,Glob,Grep,Bash(git:*),Bash(mkdir:*),Bash(cp:*),Bash(mv:*),Bash(ls:*),Bash(cat:*),Bash(find:*),Bash(grep:*),Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(node:*),Bash(npm:*),Bash(npx:*)"
